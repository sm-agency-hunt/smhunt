version: '3.8'

services:
  # Database
  database:
    image: postgres:15
    environment:
      POSTGRES_DB: smhunt
      POSTGRES_USER: smhunt
      POSTGRES_PASSWORD: smhunt123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smhunt-network

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smhunt-network

  # Backend API
  backend:
    build:
      context: ../
      dockerfile: docker/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://smhunt:smhunt123@database:5432/smhunt
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
    env_file:
      - ../.env
    depends_on:
      - database
      - redis
    volumes:
      - ../logs:/app/logs
    networks:
      - smhunt-network

  # Frontend (planned)
  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: ../docker/frontend/Dockerfile
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #   networks:
  #     - smhunt-network

  # Nginx Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - smhunt-network

volumes:
  postgres_data:
  redis_data:

networks:
  smhunt-network:
    driver: bridge